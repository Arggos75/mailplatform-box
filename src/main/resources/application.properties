spring.application.name=mailbox

# The DataSourceConfig @Configuration class reads DATABASE_URL / PG* env vars
# and builds the DataSource bean directly, so Spring Boot's DataSource
# auto-configuration is excluded to avoid conflicts.
# JdbcTemplate is still auto-configured because JdbcTemplateAutoConfiguration
# only requires a DataSource bean — which DataSourceConfig provides.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
